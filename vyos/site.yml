---
- name: Provisione VM VyOS no Proxmox
  hosts: pve
  gather_facts: no
  become: yes
  tasks:
    - name: Check VyOS ISO image
      ansible.builtin.stat:
        path: "{{ vyos_image_path }}"
      register: iso

    - name: Download ISO VyOS
      when: not iso.stat.exists
      ansible.builtin.get_url:
        url: https://community-downloads.vyos.dev/stream/1.5-stream-2025-Q2/vyos-1.5-stream-2025-Q2-generic-amd64.iso
        dest: "{{ vyos_image_path }}"

    - name: Render user-data
      ansible.builtin.template:
        src: roles/proxmox_vyos/templates/user-data.j2
        dest: /tmp/user-data
        mode: '0644'

    - name: Render network-config (disable DHCP from cloud-init)
      ansible.builtin.template:
        src: roles/proxmox_vyos/templates/network-config.j2
        dest: /tmp/network-config
        mode: '0644'

    - name: Render meta-data
      ansible.builtin.template:
        src: roles/proxmox_vyos/templates/meta-data.j2
        dest: /tmp/meta-data
        mode: '0644'

    - name: Build seed.iso (NoCloud)
      ansible.builtin.command:
        cmd: mkisofs -joliet -rock -volid cidata -output /var/lib/vz/template/iso/seed-{{ vmid }}.iso /tmp/meta-data /tmp/user-data /tmp/network-config
      args:
        creates: "/var/lib/vz/template/iso/seed-{{ vmid }}.iso"

    - name: Criar VM no Proxmox
      ansible.builtin.command:
        cmd: >-
          qm create {{ vmid }}
          --name {{ vm_name }}
          --memory {{ memory_mb }}
          --cores {{ vcpus }}
          --net0 virtio,bridge={{ wan_bridge }}
          --net1 virtio,bridge={{ lan_bridge }}
          --ide0 media=cdrom,file=local:seed-{{ vmid }}.iso
          --ide1 media=cdrom,file=local:iso/vyos-1.5-stream-2025-Q2-generic-amd64.iso
          --virtio0 local-lvm:16
          --boot order=virtio0
      args:
        creates: "/etc/pve/qemu-server/{{ vmid }}.conf"

